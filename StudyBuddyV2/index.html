<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyBuddy</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="hero-banner">
        <h1>📚 StudyBuddy</h1>
        <p>Platform perkongsian nota kuliah UPSI.</p>
    </div>

    <div class="card">
        <h3>✨ Kongsi Nota</h3>

        <form>
            <label>Tajuk Nota</label>
            <input type="text" placeholder="Contoh: Bab 1 PHP">

            <label>Subjek</label>
            <input type="text" placeholder="Contoh: DTD3013">

            <label>Fail Nota</label>
            <input type="file">

            <button type="submit">Kongsi Nota</button>
        </form>

        <p><small>* Demo sahaja. Data tidak disimpan.</small></p>
    </div>

    <div class="card">
        <h3>📄 Senarai Nota</h3>

        <table border="1" width="100%">
            <tr>
                <th>Tajuk</th>
                <th>Subjek</th>
                <th>Pemilik</th>
            </tr>

            <tr>
                <td>Bab 1 Pengenalan Web</td>
                <td>DTD3013</td>
                <td>Ali</td>
            </tr>

            <tr>
                <td>Statistik Asas</td>
                <td>DEK3023</td>
                <td>Siti</td>
            </tr>
        </table>
    </div>

</div>

</body>
</html>
